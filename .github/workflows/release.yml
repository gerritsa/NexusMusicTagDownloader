name: Build and Release

on:
  push:
    tags:
      - 'v*' # Push events to matching v*, i.e. v1.0, v20.15.10

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact_name: Nexus-Music-Tag-Downloader-macOS.zip
            build_output: 'dist/Nexus Music Tag & Downloader.app'
          - os: windows-latest
            artifact_name: Nexus-Music-Tag-Downloader-Windows.zip
            build_output: 'dist/Nexus Music Tag & Downloader'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install System Dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install ffmpeg

      - name: Install System Dependencies (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          choco install ffmpeg

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build Executable
        run: python build_app.py

      - name: Zip Artifact (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent "Nexus Music Tag & Downloader.app" "../${{ matrix.artifact_name }}"

      - name: Zip Artifact (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          Compress-Archive -Path "dist\Nexus Music Tag & Downloader\*" -DestinationPath "${{ matrix.artifact_name }}"

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-build
          path: ${{ matrix.artifact_name }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Download all workflow run artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            macos-latest-build/Nexus-Music-Tag-Downloader-macOS.zip
            windows-latest-build/Nexus-Music-Tag-Downloader-Windows.zip
          generate_release_notes: true
